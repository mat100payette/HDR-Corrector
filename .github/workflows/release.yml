name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -ne "branch") {
            throw "Manual releases must be run from a branch, not from ${{ github.ref_type }} ${{ github.ref_name }}."
          }

          $bump = "${{ inputs.bump }}"
          if ($bump -notin @("major", "minor", "patch")) {
            throw "Unsupported version bump: $bump"
          }

          git fetch --force --tags

          $versions = @(
            git tag --list "v[0-9]*.[0-9]*.[0-9]*" | ForEach-Object {
              if ($_ -match '^v(\d+)\.(\d+)\.(\d+)(?:\.\d+)?$') {
                [pscustomobject]@{
                  Tag = $_
                  Version = [version]"$($Matches[1]).$($Matches[2]).$($Matches[3])"
                  Major = [int]$Matches[1]
                  Minor = [int]$Matches[2]
                  Patch = [int]$Matches[3]
                }
              }
            }
          )

          if ($versions.Count -eq 0) {
            $version = if (Test-Path -LiteralPath "VERSION") { (Get-Content -LiteralPath "VERSION" -Raw).Trim() } else { "0.1.0" }
            $version = $version.Trim().Trim('"').Trim("'").Trim()
            if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
            }

            if ($version -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
              throw "VERSION must look like 0.1.0 when no release tags exist. Got: $version"
            }

            $tag = "v$version"
            if (git tag --list $tag) {
              throw "Tag already exists: $tag"
            }

            Write-Host "No existing release tags found. Using $tag from VERSION."
          } else {
            $base = $versions | Sort-Object Version -Descending | Select-Object -First 1
            $major = $base.Major
            $minor = $base.Minor
            $patch = $base.Patch

            switch ($bump) {
              "major" {
                $major += 1
                $minor = 0
                $patch = 0
              }
              "minor" {
                $minor += 1
                $patch = 0
              }
              "patch" {
                $patch += 1
              }
            }

            $version = "$major.$minor.$patch"
            $tag = "v$version"
            if (git tag --list $tag) {
              throw "Tag already exists: $tag"
            }
          }

          Set-Content -LiteralPath "VERSION" -Value $version

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          $stagedFiles = @(git diff --cached --name-only)
          if ($stagedFiles.Count -eq 0) {
            Write-Host "VERSION is already $version; no version commit needed."
          } else {
            git commit -m "Release $tag"
          }

          git tag -a $tag -m "HDR Corrector $tag"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved manual release $tag."

      - name: Package release
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_PFX_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $version = "${{ steps.version.outputs.version }}".Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+(?:\.\d+)?$') {
            throw "Resolved version output is not numeric SemVer: '$version'"
          }

          $packageArgs = @{
            Version = $version
            Clean = $true
            IncludeMsix = $true
          }

          if (![string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PFX_BASE64)) {
            $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.pfx"
            [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_PFX_BASE64))
            $packageArgs["SignPfxPath"] = $certPath

            if (![string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_PASSWORD)) {
              $packageArgs["SignPfxPassword"] = $env:WINDOWS_SIGNING_CERT_PASSWORD
            }
          }

          & .\scripts\package.ps1 @packageArgs

      - name: Push release commit and tag
        shell: pwsh
        run: |
          git push origin "HEAD:refs/heads/${{ github.ref_name }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $assetBase = "HDRCorrector-$tag-win-x64"
          $files = @(
            "artifacts\$assetBase-setup.exe",
            "artifacts\$assetBase.zip",
            "artifacts\SHA256SUMS.txt"
          )

          $symbols = "artifacts\$assetBase-symbols.zip"
          if (Test-Path -LiteralPath $symbols) {
            $files += $symbols
          }

          $notes = @"
          Recommended install: download ``$assetBase-setup.exe`` and run it. The installer guides setup and installs the packaged build.

          Portable fallback: download ``$assetBase.zip``, extract it, and run ``HDRCorrector.exe``. The portable build works, but it cannot use the packaged borderless-capture capability.

          SHA256 hashes are included in ``SHA256SUMS.txt``.
          "@

          $ghArgs = @("release", "create", $tag) + $files + @(
            "--title", "HDR Corrector $tag",
            "--notes", $notes,
            "--verify-tag"
          )

          & gh @ghArgs
