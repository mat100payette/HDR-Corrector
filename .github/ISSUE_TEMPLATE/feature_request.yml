name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or workflow improvement.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      description: Explain the use case or problem this would solve.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add screenshots, links, or technical context if useful.
