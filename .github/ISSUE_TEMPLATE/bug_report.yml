name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start HDR Corrector
        2. Press Ctrl+PrtScn
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HDR Corrector version
      placeholder: v0.1.0
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Logs are under %LOCALAPPDATA%\HDRCorrector\hdr-corrector.log.
      render: text
